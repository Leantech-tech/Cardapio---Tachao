server {
    listen ${PORT};
    server_name _;
    root /app/build/web;
    index index.html;

    # Compressão gzip para reduzir tamanho dos arquivos
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Cache de assets estáticos por 1 ano (Flutter gera hashes nos nomes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # Não cachear o service worker e index.html
    location ~* ^/(flutter_service_worker\.js|index\.html|version\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback: qualquer rota que não seja arquivo serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
